<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | Ali PS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; color: #fff; }
        .glass { background: rgba(255,255,255,0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .input-field { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; }
        .input-field:focus { border-color: #2563eb; background: rgba(255,255,255,0.07); outline: none; box-shadow: 0 0 15px rgba(37, 99, 235, 0.2); }
        .btn-pay { background: linear-gradient(90deg, #1e40af, #2563eb); }
    </style>
</head>
<body class="bg-[#050505] min-h-screen">

    <nav class="py-8 px-10">
        <a href="cart.html" class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-500 hover:text-white transition">&larr; Back to Cart</a>
    </nav>

    <main class="container mx-auto px-6 pb-20">
        <div class="max-w-5xl mx-auto flex flex-col lg:flex-row gap-12">
            
            <div class="flex-1">
                <h1 class="text-5xl font-black italic tracking-tighter uppercase mb-2">Checkout.</h1>
                <p class="text-blue-500 text-[10px] font-bold uppercase tracking-[0.4em] mb-12 italic underline decoration-2">Complete your mission</p>

                <form onsubmit="processOrder(event)" class="space-y-8">
                    <div class="space-y-6">
                        <h3 class="text-xs font-black uppercase tracking-widest text-gray-400">Shipping Information</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="text" id="cust-name" placeholder="FULL NAME" required class="input-field p-5 rounded-2xl text-[10px] font-bold tracking-widest uppercase">
                            <input type="email" id="cust-email" placeholder="EMAIL ADDRESS" required class="input-field p-5 rounded-2xl text-[10px] font-bold tracking-widest uppercase">
                        </div>
                        <input type="text" id="cust-address" placeholder="SHIPPING ADDRESS" required class="input-field w-full p-5 rounded-2xl text-[10px] font-bold tracking-widest uppercase">
                    </div>

                    <div class="space-y-6 pt-6">
                        <h3 class="text-xs font-black uppercase tracking-widest text-gray-400">Payment Method</h3>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                            <label class="glass p-5 rounded-2xl border-blue-600/50 flex flex-col items-center cursor-pointer hover:bg-white/5">
                                <input type="radio" name="pay" checked class="mb-2">
                                <span class="text-[9px] font-black tracking-widest uppercase">Bank Transfer</span>
                            </label>
                            <label class="glass p-5 rounded-2xl opacity-40 flex flex-col items-center cursor-not-allowed">
                                <input type="radio" name="pay" disabled class="mb-2">
                                <span class="text-[9px] font-black tracking-widest uppercase">E-Wallet</span>
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="w-full btn-pay py-6 rounded-[2rem] font-black uppercase text-[11px] tracking-[0.4em] hover:scale-[1.02] transition shadow-lg shadow-blue-900/20">
                        Confirm & Pay Now
                    </button>
                </form>
            </div>

            <aside class="w-full lg:w-[380px]">
                <div class="glass p-8 rounded-[3rem] sticky top-10 border-blue-600/10">
                    <h3 class="text-lg font-black italic uppercase mb-6 tracking-tight">Your Order</h3>
                    
                    <div id="checkout-items" class="space-y-4 mb-8 max-h-[300px] overflow-y-auto pr-2">
                        </div>

                    <div class="space-y-3 pt-6 border-t border-white/5">
                        <div class="flex justify-between text-[10px] font-bold text-gray-500 uppercase tracking-widest">
                            <span>Subtotal</span>
                            <span id="sub-val" class="text-white">Rp 0</span>
                        </div>
                        <div class="flex justify-between text-[10px] font-bold text-gray-500 uppercase tracking-widest">
                            <span>Shipping</span>
                            <span class="text-blue-500">Free</span>
                        </div>
                        <div class="flex justify-between pt-4">
                            <span class="text-xs font-black uppercase tracking-[0.2em]">Total</span>
                            <span id="total-val" class="text-2xl font-black italic text-blue-500">Rp 0</span>
                        </div>
                    </div>
                </div>
            </aside>

        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        function renderCheckout() {
            const cart = JSON.parse(localStorage.getItem('ali_ps_cart')) || [];
            const container = document.getElementById('checkout-items');
            let total = 0;

            if(cart.length === 0) {
                window.location.href = 'products.html';
                return;
            }

            container.innerHTML = cart.map(item => {
                total += item.price;
                return `
                    <div class="flex justify-between items-center gap-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-white/5 rounded-lg p-1">
                                <img src="${item.image}" class="w-full h-full object-contain">
                            </div>
                            <span class="text-[9px] font-bold uppercase tracking-tight leading-none">${item.name}</span>
                        </div>
                        <span class="text-[10px] font-black italic italic">Rp ${item.price.toLocaleString('id-ID')}</span>
                    </div>
                `;
            }).join('');

            document.getElementById('sub-val').innerText = `Rp ${total.toLocaleString('id-ID')}`;
            document.getElementById('total-val').innerText = `Rp ${total.toLocaleString('id-ID')}`;
        }

        function processOrder(e) {
            e.preventDefault();
            const cart = JSON.parse(localStorage.getItem('ali_ps_cart')) || [];
            
            const newOrder = {
                id: 'INV-' + Date.now().toString().slice(-6),
                name: document.getElementById('cust-name').value,
                date: new Date().toLocaleDateString('id-ID'),
                items: cart,
                total: cart.reduce((a, b) => a + b.price, 0),
                status: 'Success'
            };

            let orders = JSON.parse(localStorage.getItem('ali_ps_orders')) || [];
            orders.push(newOrder);
            localStorage.setItem('ali_ps_orders', JSON.stringify(orders));
            localStorage.removeItem('ali_ps_cart');

            alert('Mission Accomplished! Order #' + newOrder.id + ' has been placed.');
            window.location.href = 'orders.html';
        }

        window.onload = renderCheckout;
    </script>
</body>
</html>
