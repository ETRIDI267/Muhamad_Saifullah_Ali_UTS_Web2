<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gear Catalog | Ali PS Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; color: #fff; }
        .glass { background: rgba(255,255,255,0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .card-glow:hover { border-color: #2563eb; box-shadow: 0 0 30px rgba(37, 99, 235, 0.2); }
        .product-img { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .group:hover .product-img { transform: scale(1.1) translateY(-10px); filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5)); }
        .badge { background: linear-gradient(90deg, #2563eb, #9333ea); }
    </style>
</head>
<body class="bg-[#050505]">

    <nav class="fixed top-0 w-full z-50 glass py-5 px-10 flex justify-between items-center">
        <a href="index.html" class="text-2xl font-black italic tracking-tighter">ALI<span class="text-blue-600">PS</span></a>
        <div class="flex items-center gap-6">
            <a href="cart.html" class="relative group">
                <span class="text-[10px] font-bold uppercase tracking-widest group-hover:text-blue-500 transition">Cart</span>
                <span id="cart-count" class="absolute -top-3 -right-4 badge text-[9px] px-1.5 py-0.5 rounded-full font-bold">0</span>
            </a>
        </div>
    </nav>

    <div class="flex pt-32 min-h-screen">
        <aside class="hidden lg:block w-80 p-10 sticky top-32 h-fit">
            <h2 class="text-3xl font-black italic uppercase mb-10 tracking-tighter">Filters.</h2>
            <div class="space-y-8">
                <div>
                    <p class="text-[10px] font-black text-blue-500 uppercase tracking-[0.3em] mb-4">Category</p>
                    <ul class="space-y-3 text-xs font-bold text-gray-500 uppercase tracking-widest">
                        <li class="text-white flex items-center gap-2 cursor-pointer"><span class="w-2 h-2 rounded-full bg-blue-600"></span> All Gear</li>
                        <li class="hover:text-white transition cursor-pointer">Consoles</li>
                        <li class="hover:text-white transition cursor-pointer">Controllers</li>
                        <li class="hover:text-white transition cursor-pointer">Audio</li>
                    </ul>
                </div>
                <div class="p-6 rounded-3xl glass border-blue-600/20">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-2">Member Perk</p>
                    <p class="text-[11px] leading-relaxed italic text-blue-400">Dapatkan diskon 5% untuk pembelian controller kedua!</p>
                </div>
            </div>
        </aside>

        <main class="flex-1 p-10">
            <div class="flex flex-col md:flex-row justify-between items-end gap-6 mb-16">
                <div>
                    <h1 class="text-6xl font-black italic uppercase tracking-tighter leading-none">The <br>Collection.</h1>
                    <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[0.4em] mt-4">Official Licensed Hardware</p>
                </div>
                <div class="w-full md:w-72 relative">
                    <input type="text" id="search-input" placeholder="SEARCH GEAR..." 
                           class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-[10px] font-bold tracking-widest outline-none focus:border-blue-600 transition">
                </div>
            </div>

            <div id="product-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 text-white">
                </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        async function loadProducts() {
            try {
                const response = await fetch('data/products.json');
                const products = await response.json();
                renderProducts(products);

                // Search Real-time
                document.getElementById('search-input').addEventListener('input', (e) => {
                    const keyword = e.target.value.toLowerCase();
                    const filtered = products.filter(p => p.name.toLowerCase().includes(keyword));
                    renderProducts(filtered);
                });
            } catch (error) {
                console.error("Gagal ambil data:", error);
                document.getElementById('product-container').innerHTML = `<p class="col-span-full text-center text-red-500">Cek folder 'data/products.json' kamu Li!</p>`;
            }
        }

        function renderProducts(items) {
            const container = document.getElementById('product-container');
            if (items.length === 0) {
                container.innerHTML = `<p class="col-span-full py-20 text-center opacity-30 text-[10px] uppercase tracking-widest font-bold">Gear Not Found</p>`;
                return;
            }

            container.innerHTML = items.map(p => `
                <div class="group relative glass p-8 rounded-[3rem] card-glow transition-all duration-500">
                    <div class="absolute top-8 left-8">
                        <span class="badge text-[8px] font-black px-3 py-1 rounded-full uppercase tracking-widest italic">New Arrival</span>
                    </div>
                    <div class="h-60 mt-10 mb-10 flex items-center justify-center">
                        <img src="${p.image}" alt="${p.name}" class="product-img h-full object-contain">
                    </div>
                    <div class="space-y-4">
                        <div class="flex justify-between items-start">
                            <h3 class="text-lg font-black uppercase italic tracking-tight leading-none">${p.name}</h3>
                        </div>
                        <p class="text-[10px] text-gray-500 font-medium leading-relaxed line-clamp-2">${p.description}</p>
                        <div class="flex items-center justify-between pt-6">
                            <div>
                                <p class="text-[8px] text-gray-600 font-bold uppercase tracking-widest mb-1">Official Price</p>
                                <span class="text-xl font-black italic tracking-tighter">Rp ${p.price.toLocaleString('id-ID')}</span>
                            </div>
                            <button onclick='addToCart(${JSON.stringify(p)})' 
                                    class="bg-white text-black px-6 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-blue-600 hover:text-white transition">
                                + Add
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.onload = () => {
            loadProducts();
            if (typeof updateCartCount === 'function') updateCartCount();
        };
    </script>
</body>
</html>
